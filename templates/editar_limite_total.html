{% extends "base.html" %}

{% block title %}Editar Límite Total{% endblock %}

{% block header %}Editar Límite Total - {{ lista.nombre }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Configurar Límite Total de Recogida</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="limite_total" class="form-label">Límite Total (USD)</label>
                        <input type="number" step="0.01" class="form-control" id="limite_total" name="limite_total" 
                               value="{{ lista.limite_total }}" required>
                        <small class="text-muted">0 = sin límite</small>
                    </div>
                    <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                    <a href="{{ url_for('ver_listas') }}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
