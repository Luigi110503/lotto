{% extends "base.html" %}

{% block title %}Configurar Límites{% endblock %}

{% block header %}Configurar Límites - {{ lista.nombre }}{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                {% for i in range(100) %}
                <div class="col-md-2 mb-2">
                    <label class="form-label">Número {{ i }}</label>
                    <input type="number" class="form-control" name="limite_{{ i }}" 
                           value="{{ limites.get(i, 0) }}" step="0.01">
                </div>
                {% endfor %}
            </div>
            <button type="submit" class="btn btn-primary mt-3">Guardar Límites</button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary mt-3">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
