{% extends "base.html" %}

{% block title %}Configurar Horario{% endblock %}

{% block header %}Configurar Horario de Cierre - {{ lista.nombre }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Horario de Cierre</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="hora_cierre" class="form-label">Hora de Cierre (formato HH:MM)</label>
                        <input type="time" class="form-control" id="hora_cierre" name="hora_cierre" 
                               value="{{ lista.hora_cierre }}" required>
                        <small class="text-muted">Ej: 12:00 para mediodía, 20:00 para noche</small>
                    </div>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
